name: updates_weekly

# Controls when the workflow will run
on:
  # # Triggers the workflow on push or pull request events but only for the "main" branch
  # push:
  #   branches: ["main"]
  # pull_request:
  #   branches: ["main"]

  schedule:
    # run weekly
    - cron: "5 8 * * 0"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  updates_weekly:
    runs-on: ubuntu-latest
    # continue-on-error: true
    steps:
      #### actions/checkout ____________________________________________________
      # @see https://github.com/actions/checkout
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      #### setup submodules _____________________________________________________
      - run: |
          git submodule init
          git submodule update
          cd oswm_codebase
          git pull -r https://github.com/kauevestena/oswm_codebase
          cd ..

      #### Install system dependencies (GDAL) __________________________________
      - name: Install system dependencies (GDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      #### setup-python ________________________________________________________
      # @see https://github.com/actions/setup-python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.x"
          cache: 'pip' # caching pip dependencies

      #### setup dependencies __________________________________________________
      - run: pip install -r oswm_codebase/requirements.txt

      ### main ________________________________________________________________
      - name: Run weekly job
        id: weekly_job
        continue-on-error: true
        run: sh oswm_codebase/runners/weekly.sh
  
      #### upload ______________________________________________________________
      # @see https://github.com/actions/checkout#push-a-commit-using-the-built-in-token
      - name: Commit and push changes (if any)
        if: steps.weekly_job.outcome == 'success'
        run: |
          DATETIME="$(TZ=":America/Sao_Paulo" date +"%Y-%m-%d")"
          COMMIT_MESSAGE="weekly updates at $DATETIME"
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "$COMMIT_MESSAGE"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Create failure issue
        if: steps.weekly_job.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          WEEKLY_JOB_OUTCOME: ${{ steps.weekly_job.outcome }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly workflow failed on ${new Date().toISOString().slice(0,10)}`,
              body: `The weekly update job failed.\n\n- **weekly_job**: ${process.env.WEEKLY_JOB_OUTCOME}\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug']
            });

      - name: Fail the workflow if weekly job failed
        if: steps.weekly_job.outcome == 'failure'
        run: exit 1
